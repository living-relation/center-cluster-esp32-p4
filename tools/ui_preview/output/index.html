<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LVGL Theme Gallery</title>
    <style>
      :root {
        color-scheme: dark;
      }
      body {
        margin: 0;
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        background: #0d1117;
        color: #e6edf3;
      }
      header {
        padding: 20px;
        border-bottom: 1px solid #30363d;
      }
      h1 {
        margin: 0 0 8px;
        font-size: 22px;
      }
      p {
        margin: 0;
        color: #9da7b3;
      }
      main {
        padding: 20px;
      }
      .grid {
        display: grid;
        gap: 20px;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      }
      figure {
        margin: 0;
        border: 1px solid #30363d;
        border-radius: 12px;
        overflow: hidden;
        background: #161b22;
      }
      figcaption {
        padding: 12px 14px;
        font-weight: 600;
        border-bottom: 1px solid #30363d;
      }
      img {
        width: 100%;
        height: auto;
        display: block;
      }
      .meta {
        margin-top: 18px;
        font-size: 13px;
        color: #9da7b3;
      }
      code {
        background: #0b0f14;
        border: 1px solid #30363d;
        border-radius: 6px;
        padding: 2px 6px;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>LVGL Theme Gallery</h1>
      <p>Generated with local host renderer from <code>ui_Screen1</code>.</p>
    </header>
    <main>
      <section class="grid">
        <figure>
          <figcaption>Sport</figcaption>
          <img src="./theme_sport.png" alt="Sport theme preview" />
        </figure>
        <figure>
          <figcaption>OEM</figcaption>
          <img src="./theme_oem.png" alt="OEM theme preview" />
        </figure>
        <figure>
          <figcaption>Stealth</figcaption>
          <img src="./theme_stealth.png" alt="Stealth theme preview" />
        </figure>
      </section>
      <p class="meta">
        Mock CAN-style values in preview: RPM=6200, MPH=73, Gear=4, Odometer=012345.6
      </p>
    </main>
  </body>
</html>
